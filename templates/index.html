<!DOCTYPE html>
<html>
<head>
    <title>Interview Question Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container glass">
    <h1>🚀 Interview Question Generator</h1>

    <form method="POST" enctype="multipart/form-data">
        <input name="skills" placeholder="Enter skills">
        <input type="file" name="resume">

        <select name="level">
            <option>easy</option>
            <option>medium</option>
            <option>hard</option>
        </select>

        <input type="number" name="num_questions" value="5">
        <button>Generate</button>
    </form>

    {% if questions %}
    <form method="POST" action="/evaluate">
        {% for q in questions %}
        <div class="card">
            <p>{{ q }}</p>
            <input type="hidden" name="questions" value="{{ q }}">
            <textarea name="answers"></textarea>
            <button type="button" onclick="startVoice(this)">🎤 Speak</button>
        </div>
        {% endfor %}
        <button>Submit</button>
    </form>
    {% endif %}
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
